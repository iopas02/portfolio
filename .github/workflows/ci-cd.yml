name: Deploy Portfolio Website

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    name: Check Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Get your code
      uses: actions/checkout@v4
      
    - name: Setup tools
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install validation tools
      run: |
        npm install -g htmlhint@1.1.0
        npm install -g stylelint@15.11.0 stylelint-config-standard@34.0.0
        
    - name: Create stylelint config
      run: |
        echo '{"extends": "stylelint-config-standard", "rules": {"at-rule-no-unknown": [true, {"ignoreAtRules": ["include", "mixin", "extend"]}]}}' > .stylelintrc.json
        
    - name: Check HTML files
      run: |
        echo "Checking HTML files for errors..."
        htmlhint **/*.html || true
        
    - name: Check CSS files  
      run: |
        echo "Checking CSS files for errors..."
        stylelint "css/*.css" || true

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Get your code
      uses: actions/checkout@v4
      
    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4
      
    - name: Upload your website files
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
