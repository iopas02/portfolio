name: Deploy Portfolio Website

on:
  push:
    branches: [ development, master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    name: Check Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Get your code
      uses: actions/checkout@v4
      
    - name: Setup tools
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install validation tools
      run: |
        npm install -g htmlhint   # HTML checker
        npm install -g stylelint  # CSS checker
        
    - name: Check HTML files
      run: |
        echo "Checking HTML files for errors..."
        htmlhint **/*.html || exit 1
        
    - name: Check CSS files  
      run: |
        echo "Checking CSS files for errors..."
        stylelint "css/*.css" || exit 1

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Get your code
      uses: actions/checkout@v4
      
    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4
      
    - name: Upload your website files
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
